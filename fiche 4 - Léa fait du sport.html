<html lang="fr"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Léa fait du sport</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Comic Sans MS', 'Trebuchet MS', cursive, sans-serif;
    background: linear-gradient(135deg, #fff9e6 0%, #ffe6f0 100%);
    padding: 20px;
    min-height: 100vh;
    color: #333;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    background: white;
    border-radius: 20px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
    padding: 30px;
  }

  .header {
    text-align: center;
    margin-bottom: 30px;
    border-bottom: 4px solid #FF69B4;
    padding-bottom: 20px;
  }

  .header h1 {
    color: #FF1493;
    font-size: 2em;
    margin-bottom: 10px;
  }

  .header p {
    color: #FF69B4;
    font-size: 1.1em;
  }

  .illustration-box {
    width: 100%;
    border-radius: 15px;
    border: 3px dashed #FFB6C1;
    background: linear-gradient(135deg, #e0f7ff 0%, #fff0e6 100%);
    overflow: hidden;
    margin-bottom: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .illustration-box img {
    width: 100%;
    height: auto;
    display: block;
  }

  .story-section {
    background: #FFFAF0;
    padding: 25px;
    border-radius: 15px;
    margin-bottom: 30px;
    border-left: 5px solid #87CEEB;
  }

  .story-section h2 {
    color: #FF8C00;
    margin-bottom: 15px;
    font-size: 1.3em;
  }

  .story-text {
    line-height: 1.8;
    color: #333;
    font-size: 1.05em;
    text-align: justify;
  }

  .story-text p {
    margin-bottom: 12px;
  }

  .quiz-section {
    background: #F0F8FF;
    padding: 25px;
    border-radius: 15px;
    border-left: 5px solid #FF69B4;
  }

  .quiz-section h2 {
    color: #FF1493;
    margin-bottom: 20px;
    font-size: 1.3em;
  }

  .name-input {
    margin-bottom: 25px;
  }

  .name-input label {
    display: block;
    color: #333;
    font-weight: bold;
    margin-bottom: 8px;
    font-size: 1.05em;
  }

  .name-input input {
    width: 100%;
    max-width: 400px;
    padding: 10px 15px;
    border: 2px solid #FFB6C1;
    border-radius: 8px;
    font-family: inherit;
    font-size: 1em;
  }

  .question {
    background: white;
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 12px;
    border: 2px solid #E6E6FA;
  }

  .question-number {
    color: #FF1493;
    font-weight: bold;
    font-size: 1.1em;
    margin-bottom: 10px;
  }

  .question-text {
    color: #333;
    font-weight: bold;
    margin-bottom: 12px;
    font-size: 1.05em;
  }

  .choice {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 10px 0;
    padding: 10px 14px;
    border-radius: 8px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }

  .choice:hover {
    background: #FFF0F5;
  }

  .choice input[type="radio"] {
    width: 18px;
    height: 18px;
    cursor: pointer;
    accent-color: #FF1493;
    flex-shrink: 0;
  }

  .choice span {
    color: #333;
    font-size: 1em;
  }

  .choice.correct {
    background: #E8F8E8;
    border-color: #90EE90;
  }

  .choice.correct::after {
    content: " \2713";
    color: #228B22;
    font-weight: bold;
    margin-left: auto;
  }

  .choice.incorrect {
    background: #FFE8F0;
    border-color: #FFB6C1;
  }

  .choice.incorrect::after {
    content: " \2717";
    color: #C71585;
    font-weight: bold;
    margin-left: auto;
  }

  button {
    display: block;
    width: 100%;
    max-width: 400px;
    margin: 20px auto 0;
    background: linear-gradient(135deg, #FF69B4 0%, #FF1493 100%);
    color: white;
    border: none;
    padding: 15px 40px;
    font-size: 1.1em;
    font-weight: bold;
    font-family: inherit;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  button:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 15px rgba(255, 20, 147, 0.3);
  }

  button:active {
    transform: scale(0.98);
  }

  #email-btn {
    display: none;
    background: linear-gradient(135deg, #87CEEB 0%, #4a90d9 100%);
  }

  #result {
    display: none;
    text-align: center;
    margin-top: 25px;
    background: #FFFAF0;
    border-radius: 15px;
    padding: 20px;
    border-left: 5px solid #90EE90;
  }

  #score-text {
    font-size: 1.6em;
    font-weight: bold;
    color: #FF1493;
    margin-bottom: 8px;
  }

  #message-text {
    font-size: 1.3em;
    color: #333;
  }

  .note-info {
    text-align: center;
    color: #999;
    font-size: 0.85em;
    margin-top: 20px;
  }

  @media print {
    body { background: white; }
    button { display: none; }
  }
</style>

  "readingText": "Aujourd'hui, c'est un jour très spécial : le jour du sport !\nLe soleil brille dans le ciel bleu.\nMadame Christelle emmène toute la classe dans la grande cour.\nLéa, Karim, Fatima et Ahmed sont très contents.\nIl y a plusieurs jeux : la course, le saut et le lancer de balle.\nD'abord, c'est la course. Fatima part très vite. Elle arrive première !\nPuis c'est le tour de Léa. Elle court de toutes ses forces.\nMais Léa tombe et se fait mal au genou.\nElle a très envie de pleurer. Elle veut arrêter.\nKarim court vers elle. Il lui dit : « Courage Léa, tu peux continuer ! »\nLéa essuie ses larmes. Elle se relève, doucement.\nElle continue à courir... et elle finit la course !\nTous ses camarades crient : « Bravo Léa ! Bravo Léa ! »\nMadame Christelle dit : « Le sport nous aide à être fort et en bonne santé. »\n« Léa, aujourd'hui, tu nous as montré qu'une personne courageuse continue ses efforts, même après une chute. »",

  function init() {
    document.title = QUIZ_DATA.title;
    document.getElementById('quiz-title').textContent = '📖 ' + QUIZ_DATA.title;

    if (QUIZ_DATA.illustration) {
      document.getElementById('illustration').innerHTML = QUIZ_DATA.illustration;
    }

    const readingDiv = document.getElementById('reading-text');
    QUIZ_DATA.readingText.split('\n').forEach(line => {
      if (line.trim() === '') return;
      const p = document.createElement('p');
      p.textContent = line;
      readingDiv.appendChild(p);
    });

    const qContainer = document.getElementById('questions');
    QUIZ_DATA.questions.forEach((q, i) => {
      const qDiv = document.createElement('div');
      qDiv.className = 'question';

      const qNum = document.createElement('div');
      qNum.className = 'question-number';
      qNum.textContent = 'Question ' + (i + 1);
      qDiv.appendChild(qNum);

      const qText = document.createElement('div');
      qText.className = 'question-text';
      qText.textContent = q.text;
      qDiv.appendChild(qText);

      q.choices.forEach((choice, j) => {
        const label = document.createElement('label');
        label.className = 'choice';

        const input = document.createElement('input');
        input.type = 'radio';
        input.name = 'q' + i;
        input.value = j;

        const span = document.createElement('span');
        span.textContent = choice;

        label.appendChild(input);
        label.appendChild(span);
        qDiv.appendChild(label);
      });

      qContainer.appendChild(qDiv);
    });
  }

  init();

  document.getElementById('validate-btn').addEventListener('click', () => {
    const name = document.getElementById('student-name').value.trim();
    if (!name) {
      alert("N'oublie pas d'écrire ton prénom avant de valider !");
      return;
    }

    let allAnswered = true;
    QUIZ_DATA.questions.forEach((q, i) => {
      if (!document.querySelector('input[name="q' + i + '"]:checked')) {
        allAnswered = false;
      }
    });
    if (!allAnswered) {
      alert("Réponds à toutes les questions avant de valider !");
      return;
    }

    let score = 0;
    const details = [];

    QUIZ_DATA.questions.forEach((q, i) => {
      const selected = document.querySelector('input[name="q' + i + '"]:checked');
      const selectedValue = parseInt(selected.value, 10);
      const isCorrect = selectedValue === q.correct;
      if (isCorrect) score++;

      const labels = document.querySelectorAll('input[name="q' + i + '"]');
      labels.forEach((input, j) => {
        const label = input.parentElement;
        if (j === q.correct) {
          label.classList.add('correct');
        } else if (j === selectedValue) {
          label.classList.add('incorrect');
        }
        input.disabled = true;
      });

      details.push({ question: q.text, correcte: isCorrect });
    });

    const total = QUIZ_DATA.questions.length;
    const percent = Math.round((score / total) * 100);

    const resultDiv = document.getElementById('result');
    resultDiv.style.display = 'block';
    document.getElementById('score-text').textContent = name + ' : ' + score + ' / ' + total;

    let message;
    if (percent === 100) {
      message = String.fromCodePoint(0x1F31F) + ' Bravo ! Tu as toutes les bonnes réponses !';
    } else if (percent >= 70) {
      message = String.fromCodePoint(0x1F44F) + ' Très bien ! Continue comme ça !';
    } else if (percent >= 50) {
      message = String.fromCodePoint(0x1F4AA) + ' Bien joué, tu progresses bien !';
    } else {
      message = String.fromCodePoint(0x1F642) + " C'est un bon début ! On va continuer à s'entraîner ensemble.";
    }
    document.getElementById('message-text').textContent = message;

    document.getElementById('validate-btn').style.display = 'none';
    document.getElementById('email-btn').style.display = 'block';

    window.QUIZ_RESULT = { name, score, total, percent, details };

    resultDiv.scrollIntoView({ behavior: 'smooth' });
  });

  document.getElementById('email-btn').addEventListener('click', () => {
    const r = window.QUIZ_RESULT;
    const subject = 'Résultats lecture - ' + r.name + ' - ' + QUIZ_DATA.title;

    let body = 'Élève : ' + r.name + '\n';
    body += 'Fiche de lecture : ' + QUIZ_DATA.title + '\n';
    body += 'Score : ' + r.score + ' / ' + r.total + ' (' + r.percent + '%)\n\n';
    body += 'Détail des réponses :\n';
    r.details.forEach((d, i) => {
      body += 'Question ' + (i + 1) + ' : ' + (d.correcte ? 'Correcte' : 'Incorrecte') + '\n';
    });

    const mailto = 'mailto:' + QUIZ_DATA.teacherEmail
      + '?subject=' + encodeURIComponent(subject)
      + '&body=' + encodeURIComponent(body);

    window.location.href = mailto;
  });
